<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IIF Health</title>
    <style>
      :root { color-scheme: dark; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Arial; background:#05070c; color:#e9ddbf; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
      .top { display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
      .card { border:1px solid rgba(201,162,39,.35); background: rgba(12,14,18,.82); border-radius: 16px; padding: 14px; }
      .row { display:flex; gap:12px; flex-wrap:wrap; }
      .row > .card { flex: 1 1 320px; }
      a { color:#f5e7b6; }
      code { background: rgba(255,255,255,.06); padding:2px 6px; border-radius: 8px; }
      .ok { color:#8ff0b3; }
      .bad { color:#ff9aa2; }
      .muted { opacity:.75; }
      button { cursor:pointer; border-radius: 12px; border:1px solid rgba(201,162,39,.55); background: rgba(12,14,18,.82); color:#f5e7b6; padding:10px 12px; }
      pre { margin:0; overflow:auto; max-height: 46vh; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div style="font-size:18px;font-weight:700">صحة النظام</div>
          <div class="muted" id="ts">...</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a href="/" class="muted">العودة للرئيسية</a>
          <a href="http://127.0.0.1:18080/" target="_blank" rel="noopener" class="muted">فتح SearXNG</a>
          <button id="refresh">تحديث</button>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="row">
        <div class="card">
          <div style="font-weight:700;margin-bottom:8px">SearXNG</div>
          <div id="searxStatus">...</div>
          <div class="muted" id="searxMeta" style="margin-top:6px"></div>
        </div>
        <div class="card">
          <div style="font-weight:700;margin-bottom:8px">Rate limits</div>
          <div class="muted">قابلة للتعديل عبر متغيرات البيئة.</div>
          <div id="rl" style="margin-top:8px"></div>
        </div>
      </div>

      <div style="height:12px"></div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
          <div style="font-weight:700">تفاصيل JSON</div>
          <a class="muted" href="http://127.0.0.1:3333/healthz" target="_blank" rel="noopener">فتح `/healthz`</a>
        </div>
        <div style="height:10px"></div>
        <pre class="muted"><code id="raw">{}</code></pre>
      </div>
    </div>

    <script>
      async function loadHealth() {
        const ts = document.getElementById('ts');
        const searxStatus = document.getElementById('searxStatus');
        const searxMeta = document.getElementById('searxMeta');
        const raw = document.getElementById('raw');
        const rl = document.getElementById('rl');
        ts.textContent = '...';
        searxStatus.textContent = '...';
        searxMeta.textContent = '';
        rl.textContent = '';
        try {
          const r = await fetch('/healthz', { cache: 'no-store' });
          const j = await r.json();
          raw.textContent = JSON.stringify(j, null, 2);
          ts.textContent = 'آخر تحديث: ' + new Date().toLocaleString();

          const ok = j && j.searx && j.searx.ok;
          searxStatus.innerHTML = ok
            ? '<span class="ok">OK</span> — SearXNG يستجيب'
            : '<span class="bad">غير متاح</span> — شغّل Docker + searxng';
          const forced = (j && j.searx && j.searx.safeSearchForced) != null ? (' — SafeSearch forced=' + j.searx.safeSearchForced) : '';
          searxMeta.textContent = 'Upstream: ' + (j.searx && j.searx.upstream ? j.searx.upstream : '-') +
            ' — status=' + (j.searx && j.searx.status) +
            ' — latency=' + (j.searx && j.searx.latencyMs) + 'ms' + forced;

          const se = j.rateLimit && j.rateLimit.searx ? j.rateLimit.searx : null;
          const fe = j.rateLimit && j.rateLimit.fetch ? j.rateLimit.fetch : null;
          rl.innerHTML = [
            se ? ('<div><b>searx</b>: window=' + Math.round(se.windowMs/1000) + 's, max=' + se.max + ', keys=' + se.trackedKeys + '</div>') : '',
            fe ? ('<div><b>fetch</b>: window=' + Math.round(fe.windowMs/1000) + 's, max=' + fe.max + ', keys=' + fe.trackedKeys + '</div>') : '',
          ].join('');
        } catch (e) {
          raw.textContent = JSON.stringify({ ok: false, error: String(e && e.message || e) }, null, 2);
          ts.textContent = 'تعذر التحميل';
          searxStatus.innerHTML =
            '<span class="bad">خطأ</span> — لم نستطع قراءة <code>/healthz</code>. ' +
            'شغّل الخادم المحلي من جذر المشروع: <code>npm start</code> ثم افتح هذه الصفحة على <code>http://127.0.0.1:3333</code>.';
        }
      }
      document.getElementById('refresh').addEventListener('click', loadHealth);
      loadHealth();
      setInterval(loadHealth, 15000);
    </script>
  </body>
</html>
