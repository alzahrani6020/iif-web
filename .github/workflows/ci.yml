# تحقق من البناء عند push / PR — يُتخطى عند تغيير التوثيق فقط (توفير دقائق Actions)
# انظر: NETLIFY-FREE-TIER.md

name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "robots.txt"
      - "404.html"
  pull_request:
    paths-ignore:
      - "**.md"
      - "robots.txt"
      - "404.html"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install + verify
        # يطابق محلياً: npm run verify (بناء + فحص صياغة السكربتات)
        run: npm ci --no-audit --fund=false && npm run verify

      - name: Smoke HTML (لوحة الصندوق + مسارات حرجة)
        run: |
          node scripts/dev-server.js &
          echo $! > /tmp/iif-dev-server.pid
          sleep 3
          npm run smoke:html
          kill $(cat /tmp/iif-dev-server.pid) 2>/dev/null || true
