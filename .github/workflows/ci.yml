# فحص تلقائي: بناء بيانات الحكومة + صياغة JS + تدقيق روابط داخلية (بدون خادم ولا شبكة خارجية)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (build + syntax + maintenance audit)
        run: npm run verify && node scripts/maintenance-full-audit.mjs
