# نشر واجهة الصندوق إلى GitHub Pages (مجلد financial-consulting/iif-fund-demo كجذر للموقع).
#
# تفعيل لمرة واحدة في المستودع:
#   Settings → Pages → Build and deployment → Source: «GitHub Actions»
#
# بعد أول push ناجح: الموقع على
#   https://<اسم-المستخدم>.github.io/<اسم-المستودع>/
# (المسارات النسبية تُضبط تلقائياً عبر <base> في index.html)
#
name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'financial-consulting/iif-fund-demo/**'
      - '.github/workflows/github-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Emit i18n service packs (before static copy)
        run: node financial-consulting/iif-fund-demo/emit-service-packs.cjs

      - name: Prepare Pages site (exclude Vercel-only api/ serverless sources)
        run: |
          set -e
          rm -rf _ghp_site
          mkdir -p _ghp_site
          rsync -a --delete \
            --exclude 'api/' \
            --exclude 'node_modules/' \
            "financial-consulting/iif-fund-demo/" "_ghp_site/"

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _ghp_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
