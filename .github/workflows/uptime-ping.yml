# فحص دوري بسيط لتوفر المواقع (HTTP 200) — بدون UptimeRobot.
# عند الفشل: راجع تبويب Actions وفعّل إشعارات البريد لـ «Workflow runs» من إعدادات GitHub.
name: Uptime ping

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

concurrency:
  group: uptime-ping
  cancel-in-progress: true

jobs:
  http-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GitHub Pages
            url: https://alzahrani6020.github.io/iif-web/
          - name: Netlify fund
            url: https://fluffy-meerkat-eff966.netlify.app/fund
    steps:
      - name: ${{ matrix.name }}
        run: |
          set -e
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "${{ matrix.url }}")
          echo "$code <- ${{ matrix.url }}"
          test "$code" = "200"
