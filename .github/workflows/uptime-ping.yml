# فحص دوري لتوفر الموقع (HTTP 200) — بدون خدمة خارجية.
# GitHub Pages: إلزامي. Netlify: إعلامي فقط (قد يعيد 503 إن وُقف الموقع أو تجاوزت الحدود).
# عند فشل خطوة Pages: راجع النشر؛ فعّل إشعارات Actions من إعدادات GitHub.
name: Uptime ping

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

concurrency:
  group: uptime-ping
  cancel-in-progress: true

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Pages
        run: |
          set -e
          url="https://alzahrani6020.github.io/iif-web/"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "$url")
          echo "$code <- $url"
          test "$code" = "200"

  netlify-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Netlify (مرجعي — قد يكون معطلاً)
        run: |
          url="https://fluffy-meerkat-eff966.netlify.app/fund"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "$url")
          echo "$code <- $url (503/502 متوقع إن وُقف Netlify)"
          test "$code" = "200"
