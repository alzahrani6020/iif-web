# فحص دوري لتوفر الموقع (HTTP 200) — بدون خدمة خارجية.
# GitHub Pages: إلزامي. Netlify: إعلامي فقط (قد يعيد 503 إن وُقف الموقع أو تجاوزت الحدود).
# عند فشل خطوة Pages: راجع النشر؛ فعّل إشعارات Actions من إعدادات GitHub.
name: Uptime ping

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

concurrency:
  group: uptime-ping
  cancel-in-progress: true

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Pages
        run: |
          set -e
          url="https://alzahrani6020.github.io/iif-web/"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "$url")
          echo "$code <- $url"
          test "$code" = "200"

      - name: GitHub Pages — privacy.html
        run: |
          set -e
          url="https://alzahrani6020.github.io/iif-web/privacy.html"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "$url")
          echo "$code <- $url"
          test "$code" = "200"

      - name: GitHub Pages — transparency.html
        run: |
          set -e
          url="https://alzahrani6020.github.io/iif-web/transparency.html"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "$url")
          echo "$code <- $url"
          test "$code" = "200"

  production-searx-proxy-optional:
    runs-on: ubuntu-latest
    steps:
      - name: iiffund.com — SearX proxy (JSON smoke — إعلامي)
        run: |
          url="https://iiffund.com/api/searx/search?q=iif&format=json&language=en&categories=general"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 35 "$url" || echo "000")
          echo "$code <- $url"
          if [ "$code" = "200" ] || [ "$code" = "429" ]; then
            echo "Proxy OK"
            exit 0
          fi
          echo "::notice::بروكسي SearX على iiffund.com غير جاهز أو يعيد $code — راجع Netlify ومتغير SEARXNG_URL"
          exit 0

  netlify-optional:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Netlify — iiffund.com (مرجعي)
        run: |
          url="https://iiffund.com/fund"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 45 "$url")
          echo "$code <- $url (503/502 متوقع إن وُقف الموقع)"
          test "$code" = "200"
