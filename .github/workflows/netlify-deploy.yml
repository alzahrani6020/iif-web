# نشر إلى Netlify (نفس منطق netlify.toml)
# أضف في GitHub → Settings → Secrets and variables → Actions:
#   NETLIFY_AUTH_TOKEN  ← Netlify → User settings → Applications → Personal access tokens
#   NETLIFY_SITE_ID     ← Site settings → Site details → Site ID
#
# التشغيل: يدوياً فقط من Actions → Deploy Netlify (عطّلنا push التلقائي لتوفير الدقائق وتجنب الحدود).
# إذا لم تُعرّف الأسرار: يُعرض إشعار ويُتخطى النشر بدون فشل.
# النشر الافتراضي للواجهات الثابتة: workflow «Deploy GitHub Pages».

name: Deploy Netlify

on:
  workflow_dispatch:

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Netlify secrets + token access
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Netlify secrets missing (NETLIFY_AUTH_TOKEN / NETLIFY_SITE_ID). Skipping deploy."
            exit 0
          fi
          # Validate the token can access the site (avoid red failures like JSONHTTPError: Forbidden)
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" || true)
          if [ "$code" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ok=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Netlify token/site access check failed (HTTP $code). Fix NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID, or ensure the token belongs to the team that owns this site."
          exit 0

      - uses: actions/checkout@v4
        if: steps.netlify.outputs.ok == 'true'

      - uses: actions/setup-node@v5
        if: steps.netlify.outputs.ok == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install + build (مطابق لـ netlify.toml)
        if: steps.netlify.outputs.ok == 'true'
        run: npm ci --no-audit --fund=false && npm run build

      - name: Deploy
        if: steps.netlify.outputs.ok == 'true'
        run: npx --yes netlify-cli deploy --prod --dir .
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
