# اختبار لوحة Playwright أسبوعياً (إعلامي — لا يمنع الدمج).
# عند الفشل: راجع السجل؛ قد تحتاج جلسة/حساب اختبار أو تعديل المسارات.
name: E2E dashboard (weekly)

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: e2e-weekly
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Install Chromium (Playwright)
        run: npx playwright install chromium --with-deps

      - name: E2E — لوحة التحكم (dev-server + Playwright)
        run: npm run e2e:dashboard

  index-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Report index.html size
        run: npm run report:index-size
