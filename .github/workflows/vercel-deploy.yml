# نشر اختياري إلى Vercel من GitHub Actions (يدوياً فقط — لا push تلقائي).
# يوفّر دقائق Actions ويتجنّب تشغيلات خضراء/حمراء غير مرغوبة على كل commit.
#
# أضف في GitHub → Settings → Secrets and variables → Actions → Secrets:
#   VERCEL_TOKEN          ← Vercel → Account Settings → Tokens
#   VERCEL_ORG_ID         ← Project → Settings → General
#   VERCEL_PROJECT_ID     ← Project → Settings → General
#
# التشغيل: Actions → Deploy Vercel (optional) → Run workflow
# النشر التلقائي من Vercel عند الربط بـ Git: من لوحة Vercel (انظر VERCEL-DEPLOY.md).
# يدوياً من مجلد الواجهة: npx vercel deploy --prod --token …

name: Deploy Vercel (optional)

on:
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel secrets + token validity
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets missing (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID). Skipping deploy."
            exit 0
          fi
          # Validate token (avoid: "The token provided via --token is not valid")
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user" || true)
          if [ "$code" = "200" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ok=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Vercel token check failed (HTTP $code). Regenerate VERCEL_TOKEN and ensure it matches the correct account/org."
          exit 0

      - uses: actions/checkout@v4
        if: steps.vercel.outputs.ok == 'true'

      - uses: actions/setup-node@v5
        if: steps.vercel.outputs.ok == 'true'
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install + build (مطابق لـ netlify.toml / جذر الريبو)
        if: steps.vercel.outputs.ok == 'true'
        run: npm ci --no-audit --fund=false && npm run build

      - name: Deploy to Vercel (production)
        if: steps.vercel.outputs.ok == 'true'
        working-directory: financial-consulting/iif-fund-demo
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
