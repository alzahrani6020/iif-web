# فحص أسبوعي خفيف: بناء + تحقق أساسي + خلاصات الأخبار (يتطلب شبكة لآخر خطوة).
name: Weekly site health

on:
  schedule:
    - cron: '30 5 * * 3'
  workflow_dispatch:

concurrency:
  group: weekly-health
  cancel-in-progress: true

jobs:
  verify-and-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (build + syntax checks)
        run: npm run verify

      - name: RSS / news feed reachability
        run: npm run check:news-feeds
