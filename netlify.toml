# Netlify — نشر الموقع الثابت من جذر المستودع
# في واجهة Netlify: اترك Build command و Publish فارغين إن أمكن (يُقرأ من هنا).
# قائمة تحقق: NETLIFY-CHECKLIST.md
# صفحة 404: ضع ملف 404.html في الجذر — Netlify يخدمه تلقائياً للمسارات غير الموجودة.

[build]
  command = "npm ci --no-audit --fund=false && npm run build"
  publish = "."
  # إذا وُجدت `[skip netlify]` في آخر رسالة commit → لا يُنفَّذ بناء (توفير دقائق الطبقة المجانية)
  # انظر: NETLIFY-FREE-TIER.md
  ignore = "git log -1 --pretty=%B | grep -qF '[skip netlify]'"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  CI = "true"

[[redirects]]
  from = "/dashboard-entry"
  to = "/financial-consulting/iif-fund-demo/dashboard-entry.html"
  status = 302

[[redirects]]
  from = "/admin-standalone"
  to = "/financial-consulting/iif-fund-demo/admin-standalone.html"
  status = 302

[[redirects]]
  from = "/fund"
  to = "/financial-consulting/iif-fund-demo/index.html"
  status = 302

[[redirects]]
  from = "/fund-admin"
  to = "/financial-consulting/iif-fund-demo/index.html?iif_admin_portal=1&open_dashboard=1"
  status = 302

# مسار التطوير المحلي فقط — على الإنتاج يوجّه لبوابة الدخول الرسمية (بدون حقن جلسة)
[[redirects]]
  from = "/admin-direct"
  to = "/fund-admin"
  status = 302

[[redirects]]
  from = "/admin"
  to = "/financial-consulting/iif-fund-demo/admin.html"
  status = 302

[[redirects]]
  from = "/gov"
  to = "/financial-consulting/government-search/SIMPLE-GOVERNMENT-PLATFORM.html"
  status = 302

[[redirects]]
  from = "/legal"
  to = "/legal/index.html"
  status = 302

[[redirects]]
  from = "/privacy"
  to = "/legal/privacy.html"
  status = 302

[[redirects]]
  from = "/disclaimer"
  to = "/legal/disclaimer.html"
  status = 302

[[redirects]]
  from = "/contact"
  to = "/legal/contact.html"
  status = 302

[[redirects]]
  from = "/executive"
  to = "/executive-brief.html"
  status = 302

[[redirects]]
  from = "/brief"
  to = "/executive-brief.html"
  status = 302

[[redirects]]
  from = "/sovereign"
  to = "/sovereign-standards.html"
  status = 302

[[redirects]]
  from = "/charter"
  to = "/sovereign-standards.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # تقوية إضافية للعرض المؤسسي (HTTPS يفرضه Netlify)
    Cross-Origin-Opener-Policy = "same-origin"

[[headers]]
  for = "/financial-consulting/government-search/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
