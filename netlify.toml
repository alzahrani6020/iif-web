# موقع ثقة الذهبية — مسارات قصيرة للاستعداد لربط الدومين الأساسي (thiqqah.live أو مسار على iiffund.com)
[[redirects]]
  from = "/thiqqah"
  to = "/thiqqah-site/index.html"
  status = 302

[[redirects]]
  from = "/thiqqah/"
  to = "/thiqqah-site/index.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # تقوية إضافية للعرض المؤسسي (HTTPS يفرضه Netlify)
    Cross-Origin-Opener-Policy = "same-origin"

[[headers]]
  for = "/financial-consulting/government-search/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# أصول الواجهة (صور، خطوط ثابتة) — كاش أطول من HTML؛ راجع عند تغيير أسماء الملفات يدوياً
[[headers]]
  for = "/financial-consulting/iif-fund-demo/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# موقع ثقة الذهبية — أصول ثابتة (صور webp/jpg، خطوط woff2)
[[headers]]
  for = "/thiqqah-site/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
