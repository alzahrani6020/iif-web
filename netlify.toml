# Netlify — نشر الموقع الثابت من جذر المستودع (اختياري؛ عند تجاوز الحدود استخدم GitHub Pages).
# وضعان لدومينين نظيفين في الشريط: انظر DOMINI-IIFFUND-THIQQAH.md (موقع جذر = iiffund.com، موقع thiqqah-site = thiqqah.live).
# في واجهة Netlify: اترك Build command و Publish فارغين إن أمكن (يُقرأ من هنا).
# قائمة تحقق: NETLIFY-CHECKLIST.md
# صفحة 404: ضع ملف 404.html في الجذر — Netlify يخدمه تلقائياً للمسارات غير الموجودة.

[build]
  command = "npm ci --no-audit --fund=false && npm run build"
  publish = "."
  # إذا وُجدت `[skip netlify]` في آخر رسالة commit → لا يُنفَّذ بناء (توفير دقائق الطبقة المجانية)
  # انظر: NETLIFY-FREE-TIER.md
  ignore = "git log -1 --pretty=%B | grep -qF '[skip netlify]'"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"
  CI = "true"
  # بروكسي الدالة netlify/functions/searx.js — يمكن تجاوزه من لوحة Netlify لاحقاً
  # ملاحظة Netlify: قيم [build.environment] لا تُتاح تلقائياً لدوال Lambda وقت التشغيل؛
  # لضبط SearXNG للدوال أضف SEARXNG_URL من واجهة Netlify/CLI/API بنطاق يشمل Functions.
  # الدالة searx.js: افتراضياً https://searx.tiekoetter.com؛ يمكن عدة مثيلات مفصولة بفاصلة لإعادة المحاولة عند 429/5xx.
  SEARXNG_URL = "https://searx.tiekoetter.com"
  # الترجمة: إن لم تُضبط IIF_TRANSLATE_URL (مترجم NLLB الذاتي) تستخدم الدالة LibreTranslate الاحتياطي (انظر netlify/functions/translate.js)

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/healthz"
  to = "/.netlify/functions/healthz"
  status = 200

[[redirects]]
  from = "/api/fetch"
  to = "/.netlify/functions/fetch"
  status = 200

[[redirects]]
  from = "/api/translate"
  to = "/.netlify/functions/translate"
  status = 200

[[redirects]]
  from = "/api/searx/*"
  to = "/.netlify/functions/searx/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[redirects]]
  from = "/api/check-content"
  to = "/.netlify/functions/check-content"
  status = 200

[[redirects]]
  from = "/diagnostics.json"
  to = "/.netlify/functions/diagnostics"
  status = 200

