<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- لا تفهرس محركات البحث لصفحة الإدارة -->
  <meta name="robots" content="noindex, nofollow" />
  <title>IIF · لوحة الإدارة / Admin</title>
  <link rel="icon" href="assets/emblem.jpg" type="image/jpeg" />
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #03060c;
    }

    /* نفس مجلد index.html — يحمّل الموقع كاملاً ثم يعرض لوحة التحكم فقط (نفس الجلسة والتخزين) */
    iframe#iif-admin-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: 0;
      display: block;
    }

    .iif-admin-fallback {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      margin: 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-family: system-ui, sans-serif;
      text-align: center;
      color: #94a3b8;
      background: rgba(3, 6, 12, 0.92);
      border-top: 1px solid rgba(201, 162, 39, 0.2);
    }

    .iif-admin-fallback a {
      color: #c9a227;
    }
  </style>
</head>

<body>
  <iframe id="iif-admin-frame" title="IIF — لوحة تحكم الصندوق (مرتبطة بالموقع)"
    src="index.html?iif_admin_embed=1" loading="eager" referrerpolicy="same-origin"></iframe>
  <p class="iif-admin-fallback" role="status">
    <span dir="rtl">إذا ظهرت شاشة بيضاء: أعد نشر الموقع بعد تحديث <code>vercel.json</code> (تم السماح بعرض الصفحة داخل إطار من نفس الموقع).</span>
    ·
    <span dir="ltr">If the panel stays blank: redeploy after <code>vercel.json</code> fix.</span>
    ·
    <a href="index.html?iif_admin_embed=1" dir="ltr">Open dashboard directly (same session)</a>
  </p>
</body>

</html>
