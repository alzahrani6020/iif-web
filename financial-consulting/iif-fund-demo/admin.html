<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة التحكم الإدارية</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      html, body { height: 100%; margin: 0; background: #05070c; }
      .frame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        background: #05070c;
      }
      .fallback {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #e9ddbf;
        font-family: system-ui, -apple-system, Segoe UI, Arial;
      }
      .fallback a { color: #c9a227; }
    </style>
  </head>
  <body>
    <iframe
      class="frame"
      title="IIF Admin"
      allow="clipboard-read; clipboard-write; camera"
      referrerpolicy="no-referrer"
      src="./index.html?iif_admin_portal=1&open_dashboard=1"
    ></iframe>
    <div class="fallback" id="fallback">
      <div>
        <p>إن لم تظهر لوحة الإدارة داخل الإطار، افتح الرابط مباشرة:</p>
        <p><a href="./index.html?iif_admin_portal=1&open_dashboard=1">فتح لوحة الإدارة</a></p>
      </div>
    </div>
    <script>
      // إذا منع المتصفح iframe (سياسة/إضافات)، أظهر رابطاً مباشراً
      setTimeout(() => {
        const fb = document.getElementById('fallback');
        if (fb) fb.style.display = 'flex';
      }, 2500);
    </script>
  </body>
</html>
