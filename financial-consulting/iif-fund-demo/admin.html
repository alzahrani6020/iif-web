<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة التحكم الإدارية</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      html, body { height: 100%; margin: 0; background: #05070c; }
      .shell {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .topbar {
        z-index: 2147483647;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        background: rgba(5, 7, 12, 0.72);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(201, 162, 39, 0.18);
        font-family: system-ui, -apple-system, Segoe UI, Arial;
        color: #e9ddbf;
      }
      .topbar .title { font-weight: 700; font-size: 13px; opacity: .95; }
      .topbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .btn {
        border: 1px solid rgba(201,162,39,.45);
        background: rgba(12,14,18,.82);
        color: #f5e7b6;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        line-height: 1.2;
      }
      .btn.secondary {
        border-color: rgba(148,163,184,.35);
        color: #d7dde6;
      }
      .hint { font-size: 12px; opacity: .75; }
      .frame {
        width: 100%;
        height: 100%;
        width: 100%;
        height: 100%;
        border: 0;
        background: #05070c;
      }
      .fallback {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #e9ddbf;
        font-family: system-ui, -apple-system, Segoe UI, Arial;
      }
      .fallback a { color: #c9a227; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div>
          <div class="title">لوحة التحكم الإدارية</div>
          <div class="hint">إذا لم تظهر اللوحة داخل الإطار، افتحها داخل نفس التبويب.</div>
        </div>
        <div class="actions">
          <button class="btn" id="open-same-tab" type="button">فتح داخل نفس التبويب</button>
          <button class="btn secondary" id="reload-iframe" type="button">إعادة تحميل الإطار</button>
        </div>
      </div>
      <iframe
        id="admin-frame"
        class="frame"
        title="IIF Admin"
        allow="clipboard-read; clipboard-write; camera"
        referrerpolicy="no-referrer"
        src="./index.html?iif_admin_portal=1&open_dashboard=1"
      ></iframe>
    </div>
    <div class="fallback" id="fallback">
      <div>
        <p>إن لم تظهر لوحة الإدارة داخل الإطار، افتح الرابط مباشرة:</p>
        <p><a href="./index.html?iif_admin_portal=1&open_dashboard=1">فتح لوحة الإدارة</a></p>
      </div>
    </div>
    <script>
      // لا نغطي الـ iframe إلا إذا فشل تحميله (حتى لا "تتجمد" الأزرار داخل صفحة الدخول).
      const frame = document.getElementById('admin-frame');
      const fb = document.getElementById('fallback');
      let loaded = false;

      if (frame) {
        frame.addEventListener('load', () => {
          loaded = true;
          if (fb) fb.style.display = 'none';
        });
      }

      const openSameTab = document.getElementById('open-same-tab');
      if (openSameTab) {
        openSameTab.addEventListener('click', () => {
          window.location.href = './index.html?iif_admin_portal=1&open_dashboard=1';
        });
      }
      const reloadIframe = document.getElementById('reload-iframe');
      if (reloadIframe && frame) {
        reloadIframe.addEventListener('click', () => {
          try { loaded = false; } catch (e) {}
          frame.src = './index.html?iif_admin_portal=1&open_dashboard=1';
          setTimeout(() => {
            if (!loaded && fb) fb.style.display = 'flex';
          }, 3000);
        });
      }

      setTimeout(() => {
        if (!loaded && fb) fb.style.display = 'flex';
      }, 3000);
    </script>
  </body>
</html>
