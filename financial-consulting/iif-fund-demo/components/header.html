<!-- Header Component -->
<header class="site-header" id="site-header">
  <div class="site-header__inner">
    <!-- Logo -->
    <a href="index.html" class="site-logo" id="site-logo">
      <picture>
        <source type="image/webp" srcset="../assets/emblem.webp" />
        <img src="../assets/emblem.jpg" alt="IIF Emblem" class="site-logo__emblem" id="site-logo-emblem" width="56" height="56" decoding="async" />
      </picture>
      <div class="site-logo__text">
        <h1 class="site-logo__title" data-i18n="logoTitle">International Investment Fund</h1>
        <p class="site-logo__subtitle" data-i18n="logoSubtitle">Financing for Global Prosperity · All Nations Globally</p>
      </div>
    </a>

    <!-- Clock, Language, and User Section -->
    <div class="site-header__clock-lang">
      <!-- Site Clock -->
      <div class="site-clock" aria-live="polite" aria-label="Local time">
        <span class="site-clock__time" id="site-clock-time">00:00 AM</span>
        <span class="site-clock__tz" id="site-clock-tz">UTC</span>
        <span class="site-clock__date" id="site-clock-date">Jan 1, 2024</span>
      </div>

      <!-- محرك بحث SearXNG + Google — ظاهر دون الاعتماد على سكربت الإخفاء على الإنتاج -->
      <a
        href="/search"
        class="btn btn--ghost btn-sm"
        id="header-open-search-engine"
        style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; white-space:nowrap;"
        aria-label="Open search engine"
        title="SearXNG"
      >
        <span class="lang-ar">محرك البحث</span>
        <span class="lang-en">Search engine</span>
      </a>
      <a
        href="https://www.google.com/"
        class="btn btn--ghost btn-sm"
        id="header-open-google-search"
        target="_blank"
        rel="noopener noreferrer"
        style="display:inline-flex; align-items:center; gap:8px; text-decoration:none; white-space:nowrap; border-color: rgba(66, 133, 244, 0.45);"
        data-i18n-title="iifGoogleSearchHint"
        title="Google"
      >
        <span class="lang-ar">بحث Google</span>
        <span class="lang-en">Google search</span>
      </a>

      <!-- Language Selector -->
      <div class="lang-selector">
        <select id="language-selector" aria-label="Select language">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="fr">Français</option>
          <option value="es">Español</option>
        </select>
      </div>

      <!-- User Card (shown when logged in) -->
      <div class="header-user-card" id="header-user-card" style="display: none;" aria-label="Logged in user">
        <div class="header-user-card__photo-wrap">
          <img class="header-user-card__photo" id="header-user-photo" 
               src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Ccircle fill='%232d3a4f' cx='24' cy='24' r='24'/%3E%3Cpath fill='%23c9a227' d='M24 24a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm0 8c-6 0-12 3-12 8v4h24v-4c0-5-6-8-12-8z'/%3E%3C/svg%3E" 
               alt="User avatar" width="48" height="48">
        </div>
        <div class="header-user-card__info">
          <span class="header-user-card__name" id="header-user-name">Guest</span>
          <span class="header-user-card__meta" id="header-user-meta">Member</span>
        </div>
      </div>

      <!-- Auth Buttons (shown when logged out) -->
      <div class="site-header__auth-btns" id="header-auth-btns" aria-label="Account">
        <button type="button" class="btn btn--ghost btn-sm" id="auth-header-login">
          <span data-i18n="signIn">Sign in</span>
        </button>
        <button type="button" class="btn btn--primary btn-sm" id="auth-header-register">
          <span data-i18n="createAccount">Create account</span>
        </button>
      </div>
    </div>
  </div>
</header>
