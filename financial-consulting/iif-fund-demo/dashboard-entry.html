<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>لوحة التحكم — IIF</title>
  <style>
    html, body { margin: 0; height: 100%; background: #03060c; }
    .bar {
      font-family: system-ui, Segoe UI, Arial, sans-serif;
      padding: 10px 14px;
      background: #0a0e18;
      color: #e8e4dc;
      font-size: 13px;
      border-bottom: 1px solid rgba(201, 162, 39, 0.28);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .bar a { color: #e8d48a; }
    .frame-wrap {
      height: calc(100vh - 46px);
      min-height: 320px;
    }
    iframe {
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #03060c;
    }
  </style>
</head>
<body>
  <div class="bar">
    <span>لوحة التحكم — لا تُعرض هنا الصفحة الرئيسية؛ المحتوى أدناه هو التطبيق مع فتح اللوحة تلقائياً (محلي: جلسة المالك).</span>
    <a href="/">← الموقع العام</a>
  </div>
  <div class="frame-wrap">
    <iframe id="dash" title="IIF لوحة التحكم"></iframe>
  </div>
  <script>
    (function () {
      var q = '?iif_admin_portal=1&open_dashboard=1';
      var h = location.hostname || '';
      if (h === '127.0.0.1' || h === 'localhost' || h === '[::1]') {
        q += '&local_dashboard=1';
      }
      var el = document.getElementById('dash');
      if (el) el.src = 'admin-standalone.html' + q;
    })();
  </script>
</body>
</html>
