<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>صفحة غير موجودة — IIF</title>
  <meta http-equiv="refresh" content="2;url=./" />
  <script>
    (function () {
      try {
        var p = (location.pathname || '').replace(/\/+/g, '/');
        var parts = p.split('/').filter(Boolean);
        if (parts.length > 0) {
          location.replace('/' + parts[0] + '/');
          return;
        }
      } catch (e) {}
      try {
        location.replace('./');
      } catch (e2) {}
    })();
  </script>
</head>
<body style="font-family: system-ui, sans-serif; padding: 2rem; text-align: center; background: #0a0e18; color: #e2e8f0;">
  <p>الصفحة غير موجودة — جاري العودة للرئيسية…</p>
  <p dir="ltr" style="opacity: 0.85">Page not found — returning to site home…</p>
  <p dir="ltr" style="margin-top: 1.5rem"><a href="./" style="color: #c9a227">Home / الرئيسية</a></p>
</body>
</html>
