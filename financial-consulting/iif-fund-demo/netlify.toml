# Netlify — إعدادات فرعية (نشر من هذا المجلد فقط إن اخترته يدوياً).
# الموقع الرسمي للمستودع يُنشر من الجذر ويقرأ netlify.toml هناك — لا تخلط الإعدادين.
# Netlify — إعدادات النشر والأمان
# Force HTTPS: تفعيل "Force HTTPS" من لوحة Netlify (Site settings > HTTPS) يفضّل.
# هذا التوجيه يساعد في إعادة توجيه الطلبات غير الآمنة.
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
  force = true
