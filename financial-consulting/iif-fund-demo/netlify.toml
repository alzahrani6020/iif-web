# Netlify — إعدادات النشر والأمان
# Force HTTPS: تفعيل "Force HTTPS" من لوحة Netlify (Site settings > HTTPS) يفضّل.
# هذا التوجيه يساعد في إعادة توجيه الطلبات غير الآمنة.

# يطابق سياسة Vercel في vercel.json (خطوط ذاتية، Translate، اتصال https عام)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(self), camera=(self), payment=(), usb=(), magnetometer=(), gyroscope=(), document-domain=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.sheetjs.com https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-src https://translate.google.com https://www.google.com https://www.gstatic.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https:; object-src 'none'; upgrade-insecure-requests; worker-src 'self'"

[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
  force = true
