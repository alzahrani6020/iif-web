<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">البحث الحكومي العالمي الشامل - Comprehensive Government Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Language Toggle Button -->
    <button id="lang-toggle" class="lang-toggle" onclick="toggleLanguage()">EN</button>

    <!-- Main Search Container -->
    <div class="search-container">
        <h1 id="page-title">البحث الحكومي العالمي الشامل</h1>
        
        <!-- Country Dropdown -->
        <select id="country-dropdown" class="country-dropdown">
            <option value="" id="select-country">اختر الدولة</option>
            <option value="السعودية">المملكة العربية السعودية</option>
            <option value="Saudi Arabia">Saudi Arabia</option>
            <option value="الإمارات">دولة الإمارات العربية المتحدة</option>
            <option value="UAE">United Arab Emirates</option>
            <option value="مصر">جمهورية مصر العربية</option>
            <option value="Egypt">Egypt</option>
            <option value="الأردن">المملكة الأردنية الهاشمية</option>
            <option value="Jordan">Jordan</option>
        </select>

        <!-- Search Input -->
        <input type="text" id="country-search" class="search-input" placeholder="ابحث عن دولة..." autocomplete="off">

        <!-- Search Button -->
        <button id="search-btn" class="search-btn">بحث</button>
    </div>

    <!-- Results Container -->
    <div id="results" class="results">
        <!-- Results will be displayed here -->
    </div>

    <!-- Global Search Modal -->
    <div id="global-search-modal" class="global-search-modal">
        <div class="global-search-content">
            <span class="global-search-close" onclick="closeGlobalSearch()">&times;</span>
            <h2 id="global-search-title">بحث عالمي</h2>
            <input type="text" id="global-search-input" class="global-search-input" placeholder="اكتب اسم الدولة للبحث..." onkeypress="handleGlobalSearch(event)">
            <div id="global-search-suggestions">
                <!-- Quick search suggestions -->
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
