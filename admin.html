<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>IIF · لوحة الإدارة / Admin</title>
  <!-- عند النشر من مجلد iif-fund-demo كجذر، الأصول في assets/ مباشرة -->
  <link rel="icon" href="assets/emblem.jpg" type="image/jpeg" />
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #03060c;
    }

    iframe#iif-admin-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: 0;
      display: block;
    }

    .iif-admin-fallback {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      margin: 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-family: system-ui, sans-serif;
      text-align: center;
      color: #94a3b8;
      background: rgba(3, 6, 12, 0.92);
      border-top: 1px solid rgba(201, 162, 39, 0.2);
    }

    .iif-admin-fallback a {
      color: #c9a227;
    }
  </style>
</head>

<body>
  <iframe id="iif-admin-frame" title="IIF — لوحة تحكم الصندوق"
    src="index.html?iif_admin_embed=1" loading="eager" referrerpolicy="same-origin"></iframe>
  <p class="iif-admin-fallback" role="status">
    <span dir="rtl">رابط مباشر للوحة (نفس الجلسة):</span>
    <a href="index.html?iif_admin_embed=1" dir="ltr">index.html?iif_admin_embed=1</a>
    <span dir="ltr"> · </span>
    <span dir="rtl">إن كان المستودع الكامل منشوراً والمسار الطويل موجوداً، يُحدَّث الإطار تلقائياً.</span>
  </p>
  <script>
    (function () {
      var frame = document.getElementById('iif-admin-frame');
      var longPath = 'financial-consulting/iif-fund-demo/index.html?iif_admin_embed=1';
      var shortPath = 'index.html?iif_admin_embed=1';
      if (!frame || typeof fetch === 'undefined') return;
      fetch('financial-consulting/iif-fund-demo/index.html', { method: 'HEAD', cache: 'no-store' })
        .then(function (r) {
          if (r.ok) frame.src = longPath;
        })
        .catch(function () { /* يبقى shortPath */ });
    })();
  </script>
</body>

</html>
